id: sensitive_file_read
title: MCP tool invoked with a sensitive file path argument
severity: high
weight: 25
category: file_access
description: |
  An MCP tool was called with an argument pointing to a sensitive system
  path - /etc/passwd, SSH keys, Windows credential stores, .env files,
  browser credential databases, or other high-value targets. This is the
  signature of a malicious MCP server attempting to exfiltrate credentials
  or system information through its declared tool surface.
recommendation: |
  Reject this server. A legitimate MCP server has no reason to read
  system credential files, SSH keys, or OS password databases. This is
  direct evidence of credential harvesting behaviour.
detection:
  events:
    - type: mcp.tool_invocation
      payload:
        # Tool name must suggest file I/O - avoids FP on memory/graph/search
        # tools that receive a sensitive path as a node name or query string.
        name: regex:(?i)(read|get|fetch|open|load|access|view|cat|show|dump)_?(file|path|content|resource)|file_?(read|get|fetch|load|access|view|content)|read_?(resource|data|document)|get_?(resource|content|data)
        arguments: regex:(?i)(\/etc\/passwd|\/etc\/shadow|id_rsa|id_ed25519|\.ssh|\.env|\.netrc|Windows\\\\System32\\\\drivers\\\\etc\\\\hosts|NTDS\.dit|SAM|credentials\.json|\.aws\/credentials|\.azure|token_cache|Login Data|Cookies|keychain)
  threshold:
    count: 1
