id: pre_tool_network_activity
title: Server delayed first MCP response (informational)
severity: low
weight: 5
category: stealth_behavior
description: |
  The MCP server took 60 seconds or longer to respond to tools/list
  after the sandbox container was ready.  During that window the
  protocol channel was silent but the server process was alive.

  Long startup windows have several common, non-malicious explanations:

    - The server connects to a remote API on init (a Discord MCP server
      logs in to Discord, a Postgres MCP server opens a pool, etc.).
    - The server retries a connection that the sandbox blocked
      (``network_mode=none`` causes auth calls to hang on DNS).
    - The server lazily authenticates on first request.

  It can also indicate something the operator cannot see directly:
  beaconing, credential lookups, or out-of-band activity.  Long startup
  alone is therefore informational, not conclusive.  The signal becomes
  meaningful when correlated with the destination of the outbound
  traffic and whether that destination matches the server's declared
  purpose.
recommendation: |
  Re-run with ``--allow-network`` and a DNS / packet-capture sidecar.
  Compare the observed destinations against the server's declared
  purpose (e.g. a Discord server contacting ``discord.com`` is
  expected; a weather server contacting ``discord.com`` is not).  If
  the destinations are off the documented allowlist, treat as suspect.
detection:
  events:
    - type: mcp.delayed_initialization
  threshold:
    count: 1
