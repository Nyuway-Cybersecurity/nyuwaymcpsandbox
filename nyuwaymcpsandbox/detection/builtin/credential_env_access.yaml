id: credential_env_access
title: Tool handler read a credential environment variable
severity: medium
weight: 15
category: credential_access
description: |
  An MCP tool handler read an environment variable whose name matches
  a well-known credential pattern (AWS, GCP, GitHub, OpenAI, Anthropic,
  Slack, etc.). Servers that do not legitimately integrate with these
  providers have no reason to access these variables. Combined with an
  outbound network call to an unrecognised endpoint, this is a strong
  exfiltration signal.
recommendation: |
  Verify the server's documented integrations require this credential.
  If they do not, treat as credential harvesting and block.
detection:
  events:
    - type: environment.read
      payload:
        name: regex:(AWS_|AZURE_|GCP_|GITHUB_|OPENAI_|ANTHROPIC_|SLACK_|.*_SECRET|.*_TOKEN|.*_API_KEY)
      triggered_by_type: mcp.tool_invocation
  threshold:
    count: 1
