name: Release

# Publishes nyuwaymcpsandbox to PyPI whenever a vX.Y.Z tag is pushed.
#
# Uses PyPI trusted publishing (OIDC) - no API tokens stored in this repo.
# One-time PyPI setup required: configure a publisher at
# https://pypi.org/manage/account/publishing/ with these values:
#
#   PyPI Project Name: nyuwaymcpsandbox
#   Owner: Nyuway-Cybersecurity
#   Repository name: nyuwaymcpsandbox
#   Workflow name: release.yml
#   Environment name: pypi
#
# Once configured, every tag push that matches v*.*.* triggers the build
# and publish. No secrets to rotate, no API tokens to leak.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # Run the full test suite one more time before publishing.
  # We do not want a release that does not pass tests.
  test:
    name: Pre-release test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Lint
        run: ruff check .

  # Verify the tag matches the version in pyproject.toml + __init__.py.
  # A mismatch here means the version bump was not done correctly; refuse
  # to publish to avoid shipping a mislabelled wheel.
  verify-version:
    name: Verify tag matches package version
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches pyproject.toml version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VERSION=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', open('nyuwaymcpsandbox/__init__.py').read()); print(m.group(1))")
          echo "Tag version:        $TAG_VERSION"
          echo "pyproject.toml:     $PKG_VERSION"
          echo "__init__.py:        $INIT_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch. Tag=$TAG_VERSION, pyproject=$PKG_VERSION, __init__=$INIT_VERSION"
            exit 1
          fi

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: List built artifacts
        run: ls -la dist/
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      # Tied to the PyPI trusted-publisher config. The "pypi" environment
      # name must match what is registered on pypi.org for OIDC to mint
      # a valid identity token.
      name: pypi
      url: https://pypi.org/p/nyuwaymcpsandbox
    permissions:
      # Required for OIDC trusted publishing - no PyPI API token needed.
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password` parameter - trusted publishing handles auth via OIDC.
