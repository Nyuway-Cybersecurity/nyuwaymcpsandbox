# Curated list of 30 public MCP servers for the v1.1 research campaign.
#
# Mix is:
#   10 official @modelcontextprotocol/* (baseline; expected mostly PASS)
#   15 community npm packages
#   5  community PyPI packages
#
# Path conventions inside the container:
#   /src         : the resolved source tree, bind-mounted read-only.
#                  For npm packages this is the unpacked tarball, so
#                  the entry point is typically /src/dist/index.js or
#                  the path in the package's "bin" field.
#
# Fields per entry:
#   id                  : slug used for filenames and logs
#   source              : detonate target (npm:..., pypi:..., github:..., or local)
#   transport           : docker (default) | subprocess
#   mode                : full (default; runs LLM driver) | fast
#   mcp_command         : shell-quoted command string run inside the container
#   mcp_args            : alternative to mcp_command, list of args (no shlex)
#   container_image     : optional image override
#   inject_credentials  : default true; set false to skip --env-file for this server
#   allow_network       : default false; set true to allow real outbound traffic
#   timeout             : seconds; default 600
#   llm                 : override the global --llm for this server
#   api_key_env         : env var to source the LLM api key from
#
# Python (pypi) servers run via subprocess transport because v1.0 Docker
# mode lacks a pip-install layer (filed in ROADMAP_internal v1.1). Their
# entries below document the resulting monitor gap.

# === Official @modelcontextprotocol/* (10) ===

- id: mcp-server-everything
  source: npm:@modelcontextprotocol/server-everything
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-memory
  source: npm:@modelcontextprotocol/server-memory
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-sequential-thinking
  source: npm:@modelcontextprotocol/server-sequential-thinking
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-github
  source: npm:@modelcontextprotocol/server-github
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-aws-kb-retrieval
  source: npm:@modelcontextprotocol/server-aws-kb-retrieval
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-filesystem
  source: npm:@modelcontextprotocol/server-filesystem
  transport: docker
  mode: full
  # /tmp is writable (tmpfs in browser-image; otherwise still readable
  # for the server's allowed-dirs check).
  mcp_command: "node /src/dist/index.js /tmp"

- id: mcp-server-brave-search
  source: npm:@modelcontextprotocol/server-brave-search
