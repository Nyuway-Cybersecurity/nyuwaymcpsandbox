- id: mcp-server-gitlab
  source: npm:@modelcontextprotocol/server-gitlab
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-google-maps
  source: npm:@modelcontextprotocol/server-google-maps
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"


# === Community npm (15) ===

- id: mcp-server-puppeteer-official
  source: npm:@modelcontextprotocol/server-puppeteer
  transport: docker
  mode: full
  container_image: mcr.microsoft.com/playwright:v1.57.0-noble
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-mysql
  source: npm:@benborla29/mcp-server-mysql
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"

- id: mcp-server-kubernetes
  source: npm:mcp-server-kubernetes
  transport: docker
  mode: full
  mcp_command: "node /src/dist/index.js"
  # Spent 2m+ in connection retry loop in earlier tests.
  timeout: 900

- id: notion-mcp-server
  source: npm:@notionhq/notion-mcp-server
  transport: docker
  mode: full
  mcp_command: "node /src/bin/cli.mjs"

- id: simulator-mcp-server
  source: npm:@joshuarileydev/simulator-mcp-server
  transport: subprocess
  mode: fast
  # iOS simulator binding; macOS-only. fast mode for protocol probe only.
  mcp_args: ["node", "/src/dist/index.js"]

- id: playwright-mcp-server
  source: npm:@executeautomation/playwright-mcp-server
  transport: docker
  mode: full
  container_image: mcr.microsoft.com/playwright:v1.57.0-noble
