# === Community PyPI (5) ===
# Python servers run via subprocess transport until v1.1 ships a Docker
# Python install layer. Documented monitor gap: NetworkMonitor,
# FilesystemMonitor, EnvironmentMonitor, ProcessMonitor do not run.

- id: pypi-mcp-server-git
  source: pypi:mcp-server-git
  transport: subprocess
  mode: full
  mcp_args: ["python", "-m", "mcp_server_git", "--repository", "/tmp"]

- id: pypi-mcp-server-time
  source: pypi:mcp-server-time
  transport: subprocess
  mode: full
  mcp_args: ["python", "-m", "mcp_server_time"]

- id: pypi-mcp-server-fetch
  source: pypi:mcp-server-fetch
  transport: subprocess
  mode: full
  mcp_args: ["python", "-m", "mcp_server_fetch"]

- id: pypi-mcp-server-sqlite
  source: pypi:mcp-server-sqlite
  transport: subprocess
  mode: full
  mcp_args: ["python", "-m", "mcp_server_sqlite", "--db-path", "/tmp/research.db"]

- id: pypi-mcp-server-aws-kb-retrieval
  source: pypi:mcp-server-aws-kb-retrieval
  transport: subprocess
  mode: full
  mcp_args: ["python", "-m", "mcp_server_aws_kb_retrieval"]
